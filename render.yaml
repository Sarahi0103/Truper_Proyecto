databases:
  - name: truper-db
    databaseName: truper_platform
    user: truper_admin
    plan: free

services:
  - type: web
    name: truper-web
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://truper-web.onrender.com
      - key: DB_HOST
        fromDatabase:
          name: truper-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: truper-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: truper-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: truper-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: truper-db
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: truper-db
          property: connectionString
    # Persistent disk for uploaded images so files survive redeploys
    disks:
      - name: images-disk
        mountPath: /var/www/html/images

disks:
  - name: images-disk
    sizeGb: 1
